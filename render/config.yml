token: "YOUR_API_TOKEN"
url: "https://lichess.org/"

engine:
  dir: "/app/G-ForceZero/cpp_engine/"
  name: "nnue_engine"
  protocol: "uci"
  uci_options:
    Threads: 1
    Hash: 64

abort_time: 20
fake_think_time: false



challenge:
  concurrency: 1
  sort_by: "best"
  accept_bot: true
  only_bot: false
  max_increment: 180
  max_base: 315360000
  max_days: 14
  min_increment: 0
  min_base: 0
  min_days: 0
  variants:
    - standard
  time_controls:
    - bullet
    - blitz
    - rapid
    - classical
  modes:
    - casual
    - rated

matchmaking:
  allow_matchmaking: true
  challenge_timeout: 30
  challenge_variant: standard
  challenge_mode: rated
  challenge_initial_time:
    - 60
    - 180
    - 300
    - 600
    - 900
  challenge_increment:
    - 0
    - 1
    - 2
    - 3
    - 5
    - 10
